version: "3.8"

services:
  celx-backend:
    image: celx-backend:fix
    networks:
      - celx_shared
      - celx_front_net
    volumes:
      - celx_uploads:/root/celx-site/backend/uploads
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:97452c28f62db6d77be083917b698660@postgres_postgres:5432/celx_site
      - JWT_SECRET=celx-jwt-secret-2026
      - TELEGRAM_BOT_TOKEN=8312031269:AAFto1ZfqRbj3e4mWYEBsV4KgaJ7GLGgVJ8
      - TELEGRAM_CHAT_ID=1229273513
      - CORS_ORIGIN=https://celx.com.br
    deploy:
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.celx-api.rule=Host(`api.celx.com.br`)"
        - "traefik.http.routers.celx-api.entrypoints=websecure"
        - "traefik.http.routers.celx-api.tls=true"
        - "traefik.http.services.celx-api.loadbalancer.server.port=8000"
        - "traefik.http.routers.celx-uploads.rule=Host(`celx.com.br`) && PathPrefix(`/uploads`)"
        - "traefik.http.routers.celx-uploads.entrypoints=websecure"
        - "traefik.http.routers.celx-uploads.tls=true"
        - "traefik.http.routers.celx-uploads.service=celx-uploads"
        - "traefik.http.services.celx-uploads.loadbalancer.server.port=8000"
        - "traefik.constraint-label=server"

  celx-frontend:
    image: celx-frontend:fix
    networks:
      - celx_front_net
    deploy:
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.celx.rule=Host(`celx.com.br`)"
        - "traefik.http.routers.celx.entrypoints=websecure"
        - "traefik.http.routers.celx.tls=true"
        - "traefik.http.services.celx.loadbalancer.server.port=80"
        - "traefik.constraint-label=server"

networks:
  celx_shared:
    external: true
    name: celx_shared
  celx_front_net:
    driver: overlay
    attachable: true

volumes:
  celx_uploads:
